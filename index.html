<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Yarn Vault</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; padding: 20px; }
        .controls { margin-bottom: 20px; background: white; padding: 15px; border-radius: 8px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; padding: 15px; border-radius: 8px; border-left: 5px solid #6b4fbb; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .weight-tag { font-size: 0.8em; color: white; background: #6b4fbb; padding: 2px 8px; border-radius: 10px; }
        .match-ready { border-left-color: #2ecc71; }
        .card img {
    width: 100%;
    height: 250px;
    object-fit: cover; /* This crops the image to fit perfectly without stretching */
    border-radius: 4px;
    margin-bottom: 10px;
}
    </style>
</head>
<body>

    <h1>🧶 Yarn Database</h1>

    <div class="controls">
        <label>Filter by Weight:</label>
        <select id="weightFilter" onchange="renderYarn()">
            <option value="All">All Weights</option>
            <option value="Fingering">Fingering</option>
            <option value="Worsted">Worsted</option>
            <option value="Bulky">Bulky</option>
        </select>
    </div>

    <div id="yarnGrid" class="grid"></div>

    <script>
        // This is your "Database" (Mock Data)
        const myYarn = [
            { id: 1, brand: "Malabrigo", color: "Azul Profundo", weight: "Worsted", yardage: 210, quantity: 4, image: " /ball-of-wool-fashion-svgrepo-com.svg"   },
            { id: 2, brand: "Hedgehog Fibres", color: "Potluck", weight: "Fingering", yardage: 400, quantity: 1, image: "/ball-of-wool-fashion-svgrepo-com.svg" },
            { id: 3, brand: "Cascade 220", color: "Charcoal", weight: "Worsted", yardage: 220, quantity: 6, image: "/ball-of-wool-fashion-svgrepo-com.svg"  }
        ];

        function renderYarn() {
            const filter = document.getElementById('weightFilter').value;
            const grid = document.getElementById('yarnGrid');
            grid.innerHTML = ''; // Clear current view

            myYarn.forEach(yarn => {
                if (filter === "All" || yarn.weight === filter) {
                    const totalYardage = yarn.yardage * yarn.quantity;
                    
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
    <img src="${yarn.image}" alt="${yarn.brand} ${yarn.color}">
    <h3>${yarn.brand}</h3>
    <p><strong>Color:</strong> ${yarn.color}</p>
    <span class="weight-tag">${yarn.weight}</span>
    <p><strong>Total Stash:</strong> ${yarn.yardage * yarn.quantity} yds</p>
`;
                    grid.appendChild(card);
                }
            });
        }

        // Run the function on page load
        renderYarn();
    </script>
</body>
</html>
