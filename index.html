<div class="controls">
    <div>
        <label>Weight</label>
        <select id="weightFilter" onchange="displayYarn()">
            <option value="All">All</option>
            <option value="Fingering">Fingering</option>
            <option value="Sport">Sport</option>
            <option value="Worsted">Worsted</option>
            <option value="Bulky">Bulky</option>
        </select>
    </div>
    <div>
        <label>Color</label>
        <select id="colorFilter" onchange="displayYarn()">
            <option value="All">All</option>
            <option value="Blue">Blue</option>
            <option value="Green">Green</option>
            <option value="Red">Red</option>
            <option value="Cream">Cream</option>
            <option value="Pink">Pink</option>
            <option value="Purple">Purple</option>
            <option value="Varigated">Varigated</option>
        </select>
    </div>
</div>

<script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS4YqSKZ84AjEXmmMxwHsDauyXM5kdjAR27-V9_v8pxgQgI5OnoTRy-eybuXCLfiqN5gjlwcEtPxRRs/pub?output=csv";
    let yarnDatabase = [];

    async function fetchStash() {
        try {
            const response = await fetch(sheetUrl);
            const data = await response.text();
            const rows = data.split('\n').slice(1); 

            yarnDatabase = rows.map(row => {
                const cols = row.split(',');
                return {
                    brand: cols[1],
                    name: cols[2],
                    colorFamily: cols[3] ? cols[3].trim() : "",
                    colorName: cols[4] ? cols[4].trim() : "",
                    weight: cols[5] ? cols[5].trim() : "",
                    yardage: parseFloat(cols[6]) || 0,
                    quantity: parseFloat(cols[7]) || 0,
                    image: cols[8] ? cols[8].trim() : ""
                };
            });
            displayYarn();
        } catch (error) {
            console.error("Error loading sheet:", error);
        }
    }

    function displayYarn() {
        const weightChoice = document.getElementById('weightFilter').value;
        const colorChoice = document.getElementById('colorFilter').value;
        const grid = document.getElementById('yarnGrid');
        grid.innerHTML = '';

        yarnDatabase.forEach(yarn => {
            // Dual Filter Logic: Check both weight AND color
            const matchWeight = (weightChoice === "All" || yarn.weight === weightChoice);
            const matchColor = (colorChoice === "All" || yarn.colorFamily === colorChoice);

            if (yarn.brand && matchWeight && matchColor) {
                const totalYards = Math.round(yarn.yardage * yarn.quantity);
                const defaultImg = 'ball-of-wool-fashion-svgrepo-com.svg';
                
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${yarn.image || defaultImg}" onerror="this.src='${defaultImg}'">
                    <div class="card-content">
                        <div class="brand-name">${yarn.brand}</div>
                        <h3 class="yarn-title">${yarn.name || 'Fiber'}</h3>
                        <div style="margin-bottom: 10px;">
                            <span class="weight-badge">${yarn.weight}</span>
                        </div>
                        <p style="color: #707070; font-size: 0.75rem; text-transform: uppercase;">
                            ${yarn.colorFamily} / ${yarn.colorName}
                        </p>
                        <div class="stash-info">
                            <span>${yarn.quantity} SKEINS</span>
                            <span class="yardage-total">${totalYards} YDS</span>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            }
        });
    }

    fetchStash();
</script>
