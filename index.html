<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yarn Memory</title>
    <style>
        :root {
            --bg: #ffffff;
            --primary: #000000;
            --secondary: #707070;
            --border: #e0e0e0;
        }

        body { 
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            padding: 60px 40px; 
            color: var(--primary); 
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        h1 { 
            font-weight: 400; 
            font-size: 1.5rem; 
            letter-spacing: 0.1em; 
            margin-bottom: 60px; 
            text-transform: uppercase;
        }

        /* Controls Area */
        .controls { 
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 20px 0;
            margin-bottom: 60px;
            display: flex;
            gap: 40px;
        }

        .filter-group { display: flex; flex-direction: column; gap: 8px; }

        label { 
            font-size: 0.6rem; 
            text-transform: uppercase; 
            letter-spacing: 0.2em; 
            color: var(--secondary); 
        }

        select {
            border: none;
            background: transparent;
            font-size: 0.8rem;
            text-transform: uppercase;
            cursor: pointer;
            outline: none;
            padding: 0;
            font-family: inherit;
        }

        /* Grid Layout */
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 80px 40px; 
        }

        .card { transition: opacity 0.4s ease; }
        .card:hover { opacity: 0.7; }

.card img { 
    width: 100%; 
    aspect-ratio: 3 / 4; 
    object-fit: contain; /* This keeps the SVG from stretching */
    background-color: #f9f9f9; 
    padding: 40px; /* This creates the centered 'gallery' look */
    box-sizing: border-box;
    margin-bottom: 24px;
    filter: grayscale(100%);
    transition: all 0.5s ease;
}

.card:hover img { 
    filter: grayscale(0%); 
    padding: 30px; /* Subtle zoom effect */
}

        .brand-name { 
            font-size: 0.65rem; 
            text-transform: uppercase; 
            letter-spacing: 0.2em; 
            color: var(--secondary); 
            margin-bottom: 8px;
        }

        .yarn-title { 
            font-size: 1rem; 
            font-weight: 400; 
            margin: 0 0 12px 0; 
        }

        .details-row {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            border-top: 1px solid #f0f0f0;
            padding-top: 12px;
            margin-top: 12px;
        }

        .tag {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--secondary);
        }

        .quantity { font-size: 0.7rem; font-weight: 600; }

        #status-msg { text-align: center; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.2em; color: var(--secondary); }
/* If a card is 'Assigned', we can give it a subtle hint */
        .card.assigned {
            border-left: 2px solid #f0f0f0;
        }
        
    </style>
</head>
<body>

    <h1>Yarn Memory</h1>

   <div class="controls">
        <div class="filter-group">
            <label>Weight</label>
            <select id="weightFilter" onchange="displayYarn()">
                <option value="All">All</option>
                <option value="Fingering">Fingering</option>
                <option value="Sport">Sport</option>
                <option value="Worsted">Worsted</option>
                <option value="Bulky">Bulky</option>
            </select>
            <div class="filter-group" style="flex-direction: row; align-items: center; gap: 10px; margin-top: auto;">
    <input type="checkbox" id="unassignedFilter" onchange="displayYarn()" style="cursor: pointer;">
    <label for="unassignedFilter" style="margin-bottom: 0; cursor: pointer;">Show Only Available</label>
</div>
        </div>
        <div class="filter-group">
            <label>Color</label>
            <select id="colorFilter" onchange="displayYarn()">
                <option value="All">All</option>
                <option value="Blue">Blue</option>
                <option value="Green">Green</option>
                <option value="Red">Red</option>
                <option value="Cream">Cream</option>
                <option value="Pink">Pink</option>
                <option value="Purple">Purple</option>
                <option value="Varigated">Varigated</option>
                <option value="Teal">Teal</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Min. Yardage Needed</label>
            <input type="number" id="yardageFilter" placeholder="0" oninput="displayYarn()" 
                   style="border:none; border-bottom: 1px solid #e0e0e0; font-size: 0.8rem; width: 80px; outline:none; text-transform: uppercase;">
        </div>
    </div>

    <div id="yarnGrid" class="grid">
        <p id="status-msg">Initiating Vault...</p>
    </div>

 <script>
    const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vS4YqSKZ84AjEXmmMxwHsDauyXM5kdjAR27-V9_v8pxgQgI5OnoTRy-eybuXCLfiqN5gjlwcEtPxRRs/pub?output=csv";

    // CHANGE THESE to match your GitHub details
    const githubUser = "zoeakind"; 
    const githubRepo = "yarn_memory";

    let yarnDatabase = [];

    async function fetchStash() {
        try {
            const response = await fetch(sheetUrl);
            const csvData = await response.text();
            const rows = csvData.split(/\r?\n/).filter(function(row) { return row.trim() !== ""; }).slice(1);

           yarnDatabase = rows.map(function(row) {
                // This regex handles commas inside quotes (like "Merino, Silk")
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                
                let rawImg = cols[8] ? cols[8].trim() : "";
                let finalImg = "";

                if (rawImg === "") {
                    finalImg = "ball-of-wool-fashion-svgrepo-com.svg";
                } else if (rawImg.startsWith("http")) {
                    finalImg = rawImg;
                } else {
                    finalImg = "https://raw.githubusercontent.com/" + githubUser + "/" + githubRepo + "/main/yarn_images/" + rawImg;
                }

                return {
                    brand: cols[1] ? cols[1].trim() : "",
                    name: cols[2] ? cols[2].trim() : "",
                    colorFamily: cols[3] ? cols[3].trim() : "",
                    yarnName: cols[4] ? cols[4].trim() : "",
                    weight: cols[5] ? cols[5].trim() : "",
                    yardage: parseFloat(cols[6]) || 0,
                    quantity: parseFloat(cols[7]) || 0,
                    image: finalImg,
                    // SAFE CHECK: If column 9 doesn't exist yet, use the default phrase
                    patternNote: (cols[9] && cols[9].trim() !== "") ? cols[9].trim() : "Awaiting Inspiration"
                };
            });

            displayYarn();
        } catch (err) {
            document.getElementById('yarnGrid').innerHTML = "ERROR CONNECTING TO DATA";
        }
    }

    function displayYarn() {
        const weightChoice = document.getElementById('weightFilter').value;
        const colorChoice = document.getElementById('colorFilter').value;
        const yardageNeeded = parseFloat(document.getElementById('yardageFilter').value) || 0;
        const showUnassignedOnly = document.getElementById('unassignedFilter').checked; // NEW
        
        const grid = document.getElementById('yarnGrid');
        if (!grid) return;
        grid.innerHTML = '';

        // 1. Filter the database
        let displayList = yarnDatabase.filter(function(yarn) {
            const totalStashYards = yarn.yardage * yarn.quantity;
            
            const matchWeight = (weightChoice === "All" || yarn.weight === weightChoice);
            const matchColor = (colorChoice === "All" || yarn.colorFamily === colorChoice);
            const hasEnoughYardage = (totalStashYards >= yardageNeeded);
            
            // NEW: Only filter if the checkbox is checked
            const matchUnassigned = !showUnassignedOnly || (yarn.patternNote === "Awaiting Inspiration");

            return yarn.brand && matchWeight && matchColor && hasEnoughYardage && matchUnassigned;
        });

        // ... rest of your sort and render code remains the same ...

        // 2. Sort by yardage (High to Low)
        displayList.sort(function(a, b) {
            return (b.yardage * b.quantity) - (a.yardage * a.quantity);
        });

        if (displayList.length === 0) {
            grid.innerHTML = "<p id='status-msg'>No yarn matches your project requirements.</p>";
            return;
        }

        // 3. Render cards
        displayList.forEach(function(yarn) {
            const totalYds = Math.round(yarn.yardage * yarn.quantity);
            const defaultImg = 'ball-of-wool-fashion-svgrepo-com.svg';
            
            // Pluralization check
            var skeinLabel = (yarn.quantity <= 1) ? "SKEIN" : "SKEINS";

            const card = document.createElement('div');
    card.className = 'card' + (yarn.patternNote !== "Awaiting Inspiration" ? " assigned" : "");
            
            var colorString = yarn.colorFamily;
            if (yarn.yarnName) colorString += " / " + yarn.yarnName;

            card.innerHTML = 
                '<img src="' + yarn.image + '" onerror="this.src=\'' + defaultImg + '\'">' +
                '<div class="card-content">' +
                    '<div class="brand-name">' + yarn.brand + '</div>' +
                    '<h3 class="yarn-title">' + (yarn.name || "Fiber") + '</h3>' +
                    '<span class="tag">' + yarn.weight + ' weight</span>' +
                    '<p class="tag" style="margin-top:8px;">' + colorString + '</p>' +
                    '<div class="details-row">' +
                        '<span class="quantity">' + yarn.quantity + ' ' + skeinLabel + '</span>' +
                        '<span class="tag">' + totalYds + ' YDS TOTAL</span>' +
                    '</div>' +
                    '<div style="margin-top: 15px; padding-top: 10px; border-top: 1px dotted #e0e0e0;">' +
                        '<label style="font-size: 0.55rem; letter-spacing: 0.1em; color: #999; display: block; margin-bottom: 4px;">PROJECT INTENT</label>' +
                        '<p style="font-size: 0.7rem; font-style: italic; margin: 0; color: #444;">' + yarn.patternNote + '</p>' +
                    '</div>' +
                '</div>';
            
            grid.appendChild(card);
        });
    }
    fetchStash();
</script>
</body>
</html>
